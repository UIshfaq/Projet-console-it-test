name: CI Backend - Tests Automatiques

on: [push, pull_request]

jobs:
  test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Créer les variables d'environnement (.env)
        run: |
          echo "DB_HOST=localhost" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_NAME=bachelore_db" >> .env
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.DB_PASSWORD_CI }}" >> .env
          echo "JWT_SECRET=${{ secrets.JWT_SECRET_CI }}" >> .env
          # On copie le .env à la racine pour Docker Compose
          cp .env ../.env

      - name: 🐳 Démarrer MySQL (Docker)
        working-directory: ./
        run: |
          docker compose up -d db
          echo "Attente de la santé de MySQL..."
          # On utilise docker inspect pour attendre le statut 'healthy' défini dans ton compose
          until [ "`docker inspect -f {{.State.Health.Status}} mysql_bachelor`"=="healthy" ]; do
            echo "MySQL est en cours de démarrage..."
            sleep 3
          done
          echo "MySQL est prêt et opérationnel !"

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les librairies
        run: npm install

      - name: 🏗️ Migrations & Seeds
        run: |
          npx knex migrate:latest
          npx knex seed:run

      - name: 🧪 Lancer les tests d'intégration (Jest)
        # On utilise --runInBand pour éviter les conflits de tables
        run: npm test -- --runInBand
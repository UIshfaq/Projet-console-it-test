name: CI Backend - Tests Automatiques

on: [push, pull_request]

jobs:
  test-api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Créer les variables d'environnement (.env)
        run: |
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_USER=user_test" >> .env # On évite 'root' ici
          echo "DB_PASSWORD=testpass" >> .env
          echo "DB_NAME=bachelor_test_db" >> .env
          echo "MYSQL_ROOT_PASSWORD=rootpass" >> .env
          echo "JWT_SECRET=secret_de_test_ci" >> .env
          cp .env ../.env

      - name: 🐳 Démarrer MySQL (Docker)
        working-directory: ./
        run: |
          docker compose up -d db
          echo "Attente de MySQL..."
          # On attend que MySQL soit capable de répondre à une commande ping
          # On utilise l'utilisateur root car c'est lui qui a les droits d'admin au départ
          until docker exec mysql_bachelor mysqladmin ping -h localhost -prootpass | grep -q "mysqld is alive"; do
            echo "MySQL est encore en train de démarrer..."
            sleep 3
          done
          echo "MySQL est prêt et opérationnel !"

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les librairies du backend
        run: npm install

      - name: 🏗️ Construire les tables (Migrations Knex)
        run: npx knex migrate:latest

      - name: 🌱 Insérer les données de test (Seeds Knex)
        run: npx knex seed:run

      - name: 🧪 Lancer les tests d'intégration (Jest)
        run: npm test
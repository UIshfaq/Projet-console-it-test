name: CI Backend - Tests Automatiques

# Le robot s'active à chaque push, peu importe la branche !
on: [push, pull_request]

jobs:
  test-api:
    runs-on: ubuntu-latest

    # Toutes les commandes npm se feront dans le dossier backend
    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v4

      - name: ⚙️ Créer les variables d'environnement (.env)
        # On crée un faux .env pour que Docker et ton code Node.js puissent se connecter
        run: |
          echo "DB_HOST=127.0.0.1" >> .env
          echo "DB_PORT=3306" >> .env
          echo "DB_USER=root" >> .env
          echo "DB_PASSWORD=rootpass" >> .env
          echo "DB_NAME=bachelor_test_db" >> .env
          echo "MYSQL_ROOT_PASSWORD=rootpass" >> .env
          echo "JWT_SECRET=secret_de_test_ci" >> .env
          # On copie aussi le .env à la racine pour le docker-compose
          cp .env ../.env

      - name: 🐳 Démarrer MySQL (Docker)
        working-directory: ./
        run: |
          # On lance MySQL sans le --wait pour éviter le blocage du healthcheck
          docker compose up -d db
            
          # Script de "Wait-for-it" manuel : on attend que le port 3306 réponde
          echo "Attente du démarrage de MySQL..."
          timeout 60s bash -c 'until printf "" 2>>/dev/null >/dev/tcp/127.0.0.1/3306; do sleep 2; done'
          echo "MySQL est prêt !"

      - name: 🟢 Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 📦 Installer les librairies du backend
        run: npm install

      - name: 🏗️ Construire les tables (Migrations Knex)
          # On ajoute une petite boucle de retry au cas où la DB est encore en train de chauffer
        run: |
          for i in {1..5}; do
          npx knex migrate:latest && break || sleep 10;
          done

      - name: 🌱 Insérer les données de test (Seeds Knex)
        run: npx knex seed:run

      - name: 🧪 Lancer les tests d'intégration (Jest)
        run: npm test